# [INPUT]: 依赖 {SKILL.md} 的 {技能名称、触发场景与默认入口}
# [OUTPUT]: 对外提供 {UI 展示元数据}
# [POS]: {agents} 的 {产品界面配置}，服务 skill 列表和默认调用
